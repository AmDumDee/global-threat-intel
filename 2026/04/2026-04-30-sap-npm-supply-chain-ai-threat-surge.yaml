  vulnerability_details:
    cve_identifier: "N/A — Supply chain compromise, no single CVE"
    vulnerability_type: "Malicious package publication via compromised
      contributor account and misconfigured OIDC trusted publishing
      policy; credential harvesting via preinstall script execution"
    affected_systems:
      - "@cap-js/sqlite v2.2.2 (safe: v2.3.0, v2.4.0)"

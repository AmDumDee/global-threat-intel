---
threat_summary:
  title: "SAP Enterprise Supply Chain Poisoned: Developer Pipelines
    Become Credential Harvesting Infrastructure"
  report_date: "2026-04-30"
  threat_id: "TI-20260430-001"
  severity_business: "Critical"
  severity_technical: "Critical"

  executive_summary: |
    On April 29, 2026, four official SAP npm packages used across
    enterprise development teams were silently weaponized. Attackers
    inserted credential-stealing malware that executed automatically
    during routine software installation — requiring zero action from
    developers beyond their normal workflow. Cloud credentials for AWS,
    Azure, and Google Cloud, plus GitHub tokens, SSH keys, browser
    passwords, and CI/CD pipeline secrets were harvested and exfiltrated
    before most teams were aware.

    This is not a theoretical risk. Over 1,100 GitHub repositories
    were already created as exfiltration endpoints at the time of
    discovery. The attack is attributed with medium confidence to
    TeamPCP, a threat actor with a documented pattern of enterprise
    supply chain compromises. The same group has previously targeted
    Bitwarden, Checkmarx, and Trivy.

    The time-sensitivity is extreme. Organizations running SAP CAP
    or Cloud MTA development environments that executed npm installs
    between 09:55 UTC and 12:14 UTC on April 29 should treat all
    developer credentials and associated cloud environments as
    compromised until verified otherwise.

threat_intelligence:
  what_happened:
    incident_overview: |
      Attackers gained access to the publishing credentials for four
      SAP npm packages and released malicious versions within a
      two-hour window. The packages — used daily by enterprise
      development teams building on SAP's Cloud Application Programming
      Model — were modified to include a hidden installation script.
      Any developer or automated build system that installed these
      versions triggered the malware silently.

      The malware downloaded a secondary payload from GitHub, executed
      it using a legitimate JavaScript runtime, and began harvesting
      every credential it could find on the machine and in the build
      environment. It then encrypted the stolen data and uploaded it
      to GitHub repositories created under the victim's own account —
      making outbound traffic appear legitimate and extremely difficult
      to block or trace.

      The attack also self-propagated: using the stolen tokens, it
      injected malicious code into the victim's own repositories and
      published poisoned versions of their npm packages, turning each
      victim into an unwitting distribution point for the next wave.
      AI coding tools including Claude Code and VS Code were explicitly
      targeted as persistence vectors — a documented first in supply
      chain attack history.

      Root cause analysis revealed the attackers exploited a
      misconfigured npm OIDC trusted publishing policy that allowed
      any workflow branch — not just the sanctioned release branch —
      to exchange a token and publish packages. A single configuration
      gap became the entry point for a campaign affecting thousands
      of enterprise environments.

    affected_organizations:
      - name: "SAP Enterprise Development Ecosystem"
        impact: "Four official packages deprecated; developer and
          CI/CD credentials across all consuming organizations
          potentially harvested"
      - name: "Any enterprise running SAP CAP or Cloud MTA"
        impact: "Cloud environment credentials, CI/CD secrets, and
          browser-stored passwords exposed; self-propagation risk
          to downstream packages"
      - name: "Open Source / SaaS Development Teams"
        impact: "Poisoned package propagation means secondary victims
          may include organizations not directly using SAP packages"

    attack_methodology: |
      Entry was achieved by compromising a contributor account and
      exploiting a misconfigured publishing policy that did not
      restrict which code branches could release packages. Once
      inside, the attackers modified the package installation process
      to silently download and run malware the moment a developer
      typed a standard install command.

      The malware harvested credentials from developer machines,
      cloud environments, and live CI/CD pipeline memory — bypassing
      log masking entirely. All stolen data was encrypted with
      military-grade encryption before leaving the machine, ensuring
      only the attacker can read it. Exfiltration used GitHub as
      the delivery channel, making it indistinguishable from normal
      development traffic.

      The operation then used stolen credentials to inject itself
      into victims' own codebases and package releases, creating
      a self-sustaining distribution network. Persistence was
      embedded directly into AI coding agent configuration files,
      ensuring malware re-executed every time an infected repository
      was opened.

  why_it_matters:
    business_risks:
      financial_exposure: |
        Direct costs include cloud infrastructure abuse using stolen
        credentials (unauthorized compute, storage, data transfer),
        incident response and forensic investigation (typically
        $500K–$2M for enterprise-scale events), and credential
        rotation across all affected systems. Indirect costs include
        regulatory fines under GDPR (up to 4% of global revenue),
        SOX audit failures if financial system credentials were
        exposed, and potential customer notification obligations.
        Downstream propagation means liability may extend beyond
        the initially infected organization to customers and partners
        who received poisoned package updates.

      regulatory_compliance: |
        GDPR requires notification within 72 hours if personal data
        was accessible via compromised credentials. SOX Section 404
        implications arise if CI/CD pipelines touch financial
        reporting systems. HIPAA exposure exists for healthcare
        organizations with developer access to protected environments.
        SEC disclosure rules may apply for publicly traded companies
        if the breach is material. The self-propagating nature of
        this attack complicates scope determination required for
        accurate regulatory filings.

      competitive_impact: |
        Organizations confirmed as breach victims face developer
        trust erosion — a critical competitive factor in talent
        markets. If proprietary source code or unreleased product
        features were accessible through stolen repository tokens,
        intellectual property loss is a direct competitive risk.
        Companies that respond visibly and quickly can convert the
        incident into a trust signal; those that are slow or silent
        face lasting reputational damage with enterprise customers
        who conduct vendor security reviews.

      operational_disruption: |
        Immediate operational impact includes mandatory rotation of
        all developer, cloud, and CI/CD credentials — a process that
        can take days to weeks in large organizations and halts
        deployment pipelines in the interim. Any repository that
        installed the affected packages must be audited for injected
        malicious workflows before releases resume. Organizations
        that unknowingly published poisoned versions of their own
        packages face additional remediation obligations to their
        downstream users.

    industry_patterns:
      affected_sectors:
        - "Enterprise Software Development (SAP ecosystem)"
        - "Financial Services (SAP-dependent ERP environments)"
        - "Manufacturing and Logistics"
        - "Cloud-Native SaaS Development"
        - "Any organization with active npm-based CI/CD pipelines"

      trend_analysis: |
        This is the fourth documented TeamPCP supply chain operation
        in recent months, following attacks on Trivy, Checkmarx, and
        Bitwarden. The pattern shows deliberate escalation: each
        campaign adds new credential sources, improves evasion, and
        expands propagation capability. The targeting of AI coding
        agent configurations as persistence vectors represents a
        new frontier — attackers are now mapping and weaponizing
        the modern developer toolchain in its entirety.

        The use of GitHub as command-and-control infrastructure is
        now standard practice for this threat actor. Blocking it
        is operationally impossible for development organizations.
        This structural dependency on a trusted platform is being
        systematically exploited and shows no signs of abating.


      - "@cap-js/db-service v2.10.1 (safe: v2.10.1 re-release)"
      - "mbt v1.2.48 (safe: v1.2.49)"
      - "Any CI/CD runner that installed affected versions"
      - "Developer machines with npm access April 29 09:55–12:14 UTC"
    exploitation_status: "Active — confirmed malicious versions
      published and distributed; self-propagation observed in wild"

  attack_indicators:
    - "GitHub repositories appearing in developer accounts with
      description 'A Mini Shai-Hulud has Appeared'"
    - "Unexpected .claude/settings.json files in repositories
      not intentionally using Claude Code"
    - "Unexpected .vscode/tasks.json with runOn: folderOpen entries
      not placed by development team"
    - "Unexplained npm or GitHub token activity following April 29
      package installs"
    - "New GitHub Actions workflows on non-main branches not
      created by known team members"
    - "Cloud provider alerts for credential use from unexpected
      geographic locations or IP ranges"

strategic_response:
  executive_decisions:
    - priority: "Critical"
      decision: "Initiate emergency credential rotation for all
        developers and CI/CD systems that ran npm installs on or
        after April 29, 2026"
      business_justification: "Stolen credentials provide ongoing
        access to cloud environments, source code, and customer
        data until rotated. Every hour of delay extends attacker
        dwell time and potential damage."
      cost_estimate: "$50K–$500K in engineering time depending on
        organization size; substantially less than breach remediation"

    - priority: "Critical"
      decision: "Audit all repositories accessible by affected
        developer accounts for injected malicious workflows before
        resuming production deployments"
      business_justification: "Self-propagation means your own
        packages may now be poisoning your customers. Shipping
        compromised code to clients creates contractual and legal
        liability beyond the initial incident."
      cost_estimate: "$100K–$1M depending on repository count
        and required forensic depth"

    - priority: "High"
      decision: "Commission a software supply chain risk assessment
        covering all package registries used in development pipelines"
      business_justification: "This is the fourth attack of this
        type in months. Without systematic visibility into dependency
        provenance, the next incident is a question of when, not if.
        Current vendor risk frameworks do not cover this exposure."
      cost_estimate: "$200K–$800K for enterprise-scale assessment
        and tooling implementation"

    - priority: "High"
      decision: "Establish board-level reporting metrics for
        open-source dependency risk as a standing agenda item"
      business_justification: "Regulatory scrutiny of software
        supply chain security is increasing. SEC, EU CRA, and
        emerging US CISA guidance all point toward executive
        accountability for this risk category. Getting ahead of
        it now is cheaper than responding to a regulator inquiry."
      cost_estimate: "Governance cost only — no new tooling required
        in initial phase"

  governance_implications:
    board_reporting: |
      Recommended metrics for quarterly board reporting: number of
      unvetted third-party packages in production pipelines; mean
      time to detect and rotate compromised developer credentials;
      percentage of CI/CD pipelines with secrets scanning enabled;
      count of repositories with enforced branch protection and
      publishing policies. For this specific incident, report on
      exposure window, confirmed scope of credential compromise,
      and deployment pipeline status.

    disclosure_requirements: |
      Organizations with confirmed credential exposure should engage
      legal counsel immediately on GDPR 72-hour notification clock,
      SEC materiality assessment for publicly traded entities, and
      customer contract notification obligations where source code
      or shared infrastructure credentials were accessible. The
      self-propagating nature of the attack may require disclosure
      to downstream package consumers even where the organization
      itself was not the primary target.

analysis_and_insights:
  uncomfortable_truths: |
    Most enterprise security programs were not built to protect
    the software factory — they were built to protect the software
    output. Firewalls, DLP, endpoint detection: all focused on
    what leaves the building, not what gets injected during build.
    Attackers have noticed. The developer workstation and the CI/CD
    pipeline are now the highest-value, lowest-defended targets in
    the enterprise.

    The open-source dependency model is a structural liability that
    the industry has collectively decided to accept without pricing
    in the risk. Every `npm install` is an implicit trust decision
    made by a developer under time pressure, with no board visibility
    and no risk framework. This is not a technology problem. It is
    a governance gap that has been monetized by adversaries.

    Separately, this week also saw AI models identify 271 zero-day
    vulnerabilities in Firefox — a hardened, security-focused
    codebase. The same AI capability being deployed defensively
    will be used offensively. Organizations that are not actively
    investing in AI-assisted security discovery are already behind.
    The asymmetry is real, and it is accelerating.

  strategic_lessons:
    - "Package registry publishing policies are a security control
      requiring the same rigor as production access management —
      this incident turned on a single misconfigured OIDC policy"
    - "GitHub as C2 infrastructure is now standard — blocking it
      is impossible, so detection must move to behavioral analysis
      of what your own tokens are doing, not just what traffic
      leaves the network"
    - "AI coding agent configuration files are now an attack
      surface requiring inclusion in security baseline standards"
    - "Self-propagating supply chain attacks mean your incident
      scope extends to everyone who consumes your packages —
      third-party breach notification obligations are no longer
      just about your vendors"

forward_outlook:
  predictions: |
    Over the next 6–12 months, supply chain attacks will continue
    shifting from opportunistic to targeted. The TeamPCP pattern
    shows deliberate capability building — each campaign more
    sophisticated than the last, with better evasion, broader
    credential scope, and smarter persistence. Enterprise-grade
    package ecosystems (SAP, Salesforce, ServiceNow, Workday
    adjacent tooling) will be increasingly targeted because they
    offer access to large, high-value downstream environments
    through a single compromise point.

    AI-assisted vulnerability discovery will become a competitive
    differentiator for security teams — but also a force multiplier
    for attackers who can automate package analysis and identify
    publishable exploit windows faster than human defenders can
    review them. Organizations that invest now in AI-augmented
    dependency monitoring and automated credential hygiene will
    build a durable advantage. Those that do not will face escalating
    incident frequency with shrinking response windows.


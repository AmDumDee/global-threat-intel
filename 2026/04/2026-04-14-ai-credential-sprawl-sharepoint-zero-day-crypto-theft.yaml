---
threat_summary:
  title: "AI Development Velocity Drives Record Credential Leaks; SharePoint
    Zero-Day Actively Exploited; $45M Crypto Theft Disrupted"
  report_date: "2026-04-14"
  threat_id: "TI-20260414-001"
  severity_business: "Critical"
  severity_technical: "Critical"

  executive_summary: |
    GitGuardian's 2025 State of Secrets Sprawl report confirmed 28.6 million
    credentials leaked in public code repositories — a 34% year-over-year increase
    and the largest annual jump in the report's history. The primary accelerant is
    AI-assisted development: commits co-authored by AI coding tools leaked secrets
    at roughly double the baseline rate. AI-service credentials specifically grew
    81% year-over-year in leak volume, with 12 of the top 15 fastest-growing leaked
    secret types belonging to AI services. The core failure is architectural — AI
    eliminates the natural development slowdowns that previously served as informal
    governance checkpoints, and credential creation is outpacing credential governance
    at every layer of the modern software stack.

    Microsoft's April 2026 Patch Tuesday addressed 167 vulnerabilities — the
    second-largest in history — including an actively exploited SharePoint zero-day
    (CVE-2026-32201) that allows attackers to spoof trusted content inside enterprise
    collaboration environments. Researchers attribute the surge in vulnerability volume
    directly to AI-powered discovery tools. An international law enforcement operation
    (Operation Atlantic) disrupted $45 million in cryptocurrency theft from over 20,000
    victims across the US, UK, and Canada, targeting digital asset holders through
    approval phishing — a technique requiring no technical breach, only social deception.

    Boards should treat this week as a credential governance inflection point. The
    combination of AI-accelerated secret leakage, record patch volumes driven by
    AI discovery, and active exploitation of enterprise collaboration platforms
    creates compound risk that standard security programs are not designed to
    address at current velocity. Strategic architectural decisions are required,
    not incremental controls.

threat_intelligence:
  what_happened:
    incident_overview: |
      GitGuardian's annual secrets sprawl analysis covering all public GitHub
      activity in 2025 found 28,649,024 newly exposed secrets — API keys,
      passwords, database connection strings, and service account credentials —
      committed into public repositories. The 34% year-over-year increase is the
      largest in the report's history. AI-assisted commits leaked secrets at
      approximately double the baseline developer rate, not because AI tools are
      uniquely careless but because they eliminate the natural development pauses
      where credential governance previously occurred. Developers scaffold, wire
      integrations, test API calls, and commit working prototypes before credential
      ownership and rotation policies have been considered. AI-generated code
      looks production-ready before it is production-ready, and the gap is filled
      with hardcoded credentials. Over 1.2 million AI-service secrets were exposed,
      with one AI gateway platform alone seeing a 48x year-over-year increase in
      credential leaks. Machine identities now outnumber human identities 45:1 at
      most enterprises, and AI is accelerating that ratio without governance maturity
      keeping pace.

      Microsoft's April 2026 Patch Tuesday fixed 167 vulnerabilities across Windows
      and related software — including CVE-2026-32201, a SharePoint Server zero-day
      under active exploitation that allows attackers to spoof trusted content or
      interfaces inside enterprise SharePoint environments. Attackers can use it to
      present falsified information to employees, partners, or customers within a
      trusted intranet context, enabling phishing, data manipulation, and social
      engineering that leverages the inherent trust users place in internal platforms.
      The patch volume itself reflects an AI-driven trend: researchers are using AI
      tools to discover vulnerabilities faster than vendors can patch them, and the
      rate is accelerating.

      Operation Atlantic, a US-UK-Canada law enforcement collaboration, identified
      over $45 million in stolen cryptocurrency and froze approximately $12 million
      for victim restitution. Over 20,000 victims were identified across the three
      countries, targeted through approval phishing — a social engineering technique
      where victims are deceived into granting attackers complete, irrevocable control
      of their cryptocurrency wallets through what appear to be legitimate transaction
      approval prompts. No technical breach is required; only convincing deception.

      Microsoft also introduced new Windows protections against malicious Remote
      Desktop Protocol (RDP) files — configuration files used in enterprise
      environments that Russian state-sponsored APT29 has previously weaponized to
      steal credentials and files. The new controls add warnings and disable risky
      resource sharing by default, addressing a phishing vector that has been
      actively exploited.

    affected_organizations:
      - name: "All Organizations Using AI-Assisted Development Tools"
        impact: "Credential leak rate doubled vs. baseline; 29M secrets exposed
          publicly in 2025; AI agent credentials frequently unscoped, unowned,
          and unrevocable"
      - name: "Enterprise SharePoint Users (All Sectors)"
        impact: "Active zero-day exploitation enabling content spoofing inside
          trusted intranet environments; phishing and social engineering risk
          within presumed-safe internal platforms"
      - name: "Cryptocurrency and Digital Asset Holders"
        impact: "20,000+ victims; $45M stolen; approval phishing requires no
          technical breach — only social deception targeting digital wallet holders"
      - name: "Organizations Using Remote Desktop in Enterprise Environments"
        impact: "RDP file phishing historically exploited by Russian state actors
          (APT29) for credential and file theft; new Windows protections partially
          mitigate but require deployment"

    attack_methodology: |
      The credential sprawl attack surface is created during normal development
      activity. Developers using AI coding assistants produce working integrations
      faster than credential governance processes can evaluate them. Static API
      keys are committed into code, configuration files, and increasingly into
      Model Context Protocol configuration files — new AI integration standards
      that spread insecure credential patterns through copy-paste adoption of
      example configurations. Once leaked to a public repository, credentials are
      harvested by automated scanners within minutes. Long-lived credentials —
      which account for 60% of policy violations — remain exploitable indefinitely
      unless proactively rotated. Broad-scope agent credentials are particularly
      dangerous because they unlock not one service but an entire network of
      delegated integrations.

      The SharePoint zero-day requires network access to an affected SharePoint
      instance, which in enterprise deployments typically means any authenticated
      user or anyone with access to the internal network. Attackers spoof trusted
      content within the SharePoint environment, bypassing the inherent user trust
      that internal platforms receive. Approval phishing for cryptocurrency requires
      only social access — attackers typically use investment fraud ("pig butchering")
      platforms to build trust before presenting a legitimate-looking wallet
      approval request that transfers complete control to the attacker.

  why_it_matters:
    business_risks:
      financial_exposure: |
        Leaked AI-service credentials provide access to LLM APIs billed to the
        organization — API abuse costs can reach hundreds of thousands of dollars
        before detection. Database credentials and cloud access tokens exposed
        via AI coding tool commits provide direct path to data exfiltration,
        with average breach cost of $4.88M (IBM 2024). Broad-scope AI agent
        credentials that unlock multiple integrated services create systemic
        compromise risk across the entire connected application ecosystem.
        Operation Atlantic confirmed $45M stolen from 20,000 victims through
        approval phishing — for organizations holding or transacting in digital
        assets, this is a quantified, active financial risk requiring board-level
        governance, not IT-level controls.

      regulatory_compliance: |
        Publicly exposed credentials containing customer data or enabling customer
        data access trigger GDPR 72-hour breach notification and CCPA obligations
        upon confirmed exploitation. SharePoint zero-day exploitation enabling
        data manipulation within enterprise environments may require SEC 8-K
        disclosure for public companies if material systems or communications
        are affected. Cryptocurrency theft from organizational holdings requires
        financial reporting and potentially FinCEN disclosure. Organizations
        subject to SOC 2, ISO 27001, or FedRAMP must demonstrate credential
        lifecycle governance — 60% of violations involving long-lived secrets
        represents a systemic audit finding across those frameworks.

      competitive_impact: |
        AI development velocity is a competitive advantage — but only if credential
        governance keeps pace. Organizations that establish AI-speed credential
        governance (short-lived credentials, automated rotation, scoped agent
        identities) will maintain development velocity while reducing breach
        probability. Those that allow credential sprawl to accumulate will face
        increasing breach exposure as their AI agent count grows. The patch volume
        surge driven by AI vulnerability discovery means the window between
        vulnerability existence and exploitation is narrowing — organizations
        with faster patch deployment cycles will be breached less frequently than
        those still operating on monthly patch windows.

      operational_disruption: |
        Compromised AI agent credentials with broad scope require forensic review
        of every service accessible via that credential before breach scope can
        be established — a process that can take weeks and pauses dependent
        workflows. SharePoint zero-day exploitation within a trusted intranet
        can corrupt internal communications and decision-making processes in ways
        that are difficult to detect and scope. RDP phishing that succeeds in
        redirecting local drives to attacker-controlled systems requires device
        forensics to determine what was accessed, adding weeks to incident response.

    industry_patterns:
      affected_sectors:
        - "Technology and Software Development"
        - "Financial Services and Cryptocurrency"
        - "Enterprise IT (SharePoint-dependent organizations)"
        - "Any Sector Adopting AI-Assisted Development"
        - "Government and Defense (FedRAMP credential governance)"

      trend_analysis: |
        The credential sprawl trend is structural and accelerating. Each new AI
        service, orchestration framework, and integration standard creates a new
        credential type that proliferates through copy-paste adoption of insecure
        example configurations. The 34% year-over-year growth in 2025 will increase
        further as AI agent adoption broadens into customer-facing applications —
        voice AI, sales automation, and support agents each introduce new credential
        surfaces. The 167-vulnerability Patch Tuesday and researcher attribution of
        volume growth to AI discovery tools confirms that the vulnerability discovery
        rate is also accelerating, compressing the time between disclosure and
        exploitation. Both trends — faster credential creation and faster vulnerability
        discovery — favor attackers over defenders under current governance models.

technical_context:
  vulnerability_details:
    cve_identifier: "CVE-2026-32201 (SharePoint zero-day); CVE-2026-33825 (BlueHammer
      Windows Defender — patched); CVE-2026-34621 (Adobe Reader RCE — exploited
      since Nov 2025); credential sprawl — no CVE, architectural"
    vulnerability_type: |
      CVE-2026-32201: Content spoofing in SharePoint Server; allows attackers to
      present falsified trusted content to authenticated users; actively exploited.
      CVE-2026-34621: Remote code execution in Adobe Reader; exploited since
      November 2025 before patch availability. Credential sprawl: architectural
      failure in AI-speed development — static secrets committed to public
      repositories at 29M annual rate, with AI-assisted commits at 2x baseline leak rate.
    affected_systems:
      - "Microsoft SharePoint Server (all versions prior to April 2026 patches)"
      - "Adobe Reader (all versions prior to April 11, 2026 emergency patch)"
      - "Windows 10 and 11 (RDP file protections require April 2026 cumulative updates)"
      - "All AI agent and workflow automation platforms using static API credentials"
      - "Public GitHub repositories containing AI integration code"
    exploitation_status: "CVE-2026-32201: Active exploitation confirmed. CVE-2026-34621:
      Active exploitation since November 2025. Credential sprawl: continuous automated
      harvesting of exposed secrets — exploitation begins within minutes of leak."

  attack_indicators:
    - "Unexpected SharePoint content modifications or communications not initiated
      by known internal users"
    - "AI service API billing anomalies — unexpected charges from compromised
      credentials being abused for API access"
    - "Public GitHub repository scanning alerts for API keys, connection strings,
      or service account credentials in recent commits"
    - "Cryptocurrency wallet approval requests arriving outside expected transaction
      workflows or from unverified sources"
    - "RDP connection attempts from external addresses or unsigned RDP files
      distributed via email"
    - "Adobe Reader processes spawning unexpected child processes or network
      connections"

strategic_response:
  executive_decisions:
    - priority: "Critical"
      decision: "Mandate architectural transition from static API keys to short-lived,
        automatically rotating credentials for all AI agent integrations — establish
        a board-approved deadline of 90 days for completion across all production
        AI workflows, with CISO accountability for confirmation"
      business_justification: "29 million credentials leaked in 2025, growing 34%
        year-over-year, with AI-assisted commits at double the leak rate. Static
        credentials live too long, scope too broadly, and leak too easily at AI
        development speeds. This is the highest-ROI security investment available
        for organizations with active AI development programs."
      cost_estimate: "Secrets management platform deployment: $30K-$100K annually
        depending on scale. Cost of compromised broad-scope AI agent credential:
        full incident response plus all connected service forensics, $500K-$5M+."

    - priority: "Critical"
      decision: "Deploy April 2026 Windows and Adobe cumulative updates on an
        accelerated timeline — treat SharePoint zero-day (CVE-2026-32201) and
        Adobe Reader RCE (CVE-2026-34621) as emergency patches requiring same-week
        deployment with CISO sign-off confirmation, not standard monthly cycle"
      business_justification: "Both vulnerabilities are under confirmed active
        exploitation. SharePoint spoofing inside trusted intranet environments
        enables employee deception that bypasses security awareness. Adobe Reader
        RCE has been exploited since November 2025 — the exploitation window is
        already five months old for unpatched systems."
      cost_estimate: "Accelerated patch deployment: $10K-$40K in IT labor.
        SharePoint compromise enabling internal phishing or data manipulation:
        $1M-$10M in incident response, regulatory, and reputational costs."

    - priority: "High"
      decision: "Establish an AI agent identity governance program — every AI
        agent deployed in production requires a named owner, scoped permissions
        documented in an identity register, a defined expiration date, and a
        tested revocation procedure executable within one hour"
      business_justification: "Machine identities outnumber human identities 45:1
        at most enterprises and AI is accelerating that ratio. Most organizations
        cannot answer basic questions about who owns their AI agent credentials,
        what those credentials can access, or how to revoke them in an incident.
        That gap is the difference between a contained breach and systemic compromise."
      cost_estimate: "AI identity governance program: $25K-$75K to establish,
        $20K-$40K annually to maintain. Cost of unrevocable broad-scope agent
        credential compromise during incident: incalculable in lost response time."

    - priority: "High"
      decision: "Brief the board on organizational cryptocurrency and digital
        asset exposure — define approved holdings, custody arrangements, and
        transaction approval workflows that cannot be completed by a single
        individual responding to an unsolicited approval request"
      business_justification: "Operation Atlantic confirmed $45M stolen from
        20,000 victims through approval phishing requiring no technical breach.
        If your organization holds, transacts, or compensates in digital assets,
        this is a board-level financial risk requiring governance, not a technical
        control requiring IT response."
      cost_estimate: "Digital asset governance policy development: $10K-$25K.
        Cost of approval phishing event against organizational crypto holdings:
        potentially total loss of held assets with limited recovery options."

  governance_implications:
    board_reporting: |
      Boards should request monthly confirmation of: (1) SharePoint and Adobe
      patch deployment completion percentage with date, (2) AI agent credential
      inventory — total count, percentage with defined owners, percentage using
      short-lived vs. static credentials, (3) secrets scanning coverage of all
      code repositories including internal and private repositories, (4) digital
      asset holdings governance status and multi-approval controls confirmation.
      Quarterly: AI agent identity register review and recertification completion.

    disclosure_requirements: |
      Confirmed SharePoint zero-day exploitation affecting internal communications
      or data requires SEC 8-K assessment for public companies within four business
      days if material. Exposed credentials enabling customer data access trigger
      GDPR 72-hour and CCPA notification obligations. Cryptocurrency theft from
      organizational holdings requires financial reporting and legal counsel
      assessment of FinCEN obligations. Adobe Reader RCE exploitation on systems
      processing regulated data requires breach scoping before notification
      timelines can be established — legal counsel should be engaged immediately
      upon confirmed exploitation.

analysis_and_insights:
  uncomfortable_truths: |
    The 29 million leaked credentials are not a developer training problem. They
    are the predictable output of a governance architecture designed for human-paced
    development applied to AI-paced development. When a developer using an AI coding
    tool produces in four hours what previously took four days, every informal
    checkpoint that previously caught insecure credential patterns — code review,
    peer discussion, the simple act of slowing down — is compressed or eliminated.
    Security awareness training and developer education do not restore those
    checkpoints. Only architectural changes — secrets management platforms, workload
    identity federation, automated credential scanning in CI/CD pipelines — can
    operate at AI speed. Organizations that respond to this report with training
    programs will see the number grow to 40 million next year.

    The 167-vulnerability Patch Tuesday should be read as a leading indicator,
    not an isolated event. Researchers attributed the volume directly to AI
    vulnerability discovery tools. As those tools improve and proliferate —
    to defenders and attackers alike — the volume of known vulnerabilities will
    continue to grow, compressing the time between disclosure and exploitation.
    Organizations operating on monthly patch cycles designed for a world with
    dozens of monthly patches are already misaligned with a world producing
    hundreds. The patch cycle itself is a governance artifact that needs
    reassessment, not just the individual patches within it.

  strategic_lessons:
    - "AI development velocity and credential governance must be treated as
      coupled systems — accelerating one without the other accumulates breach
      risk at the rate of development speed, not security team capacity."
    - "AI agent identities require the same governance rigor as human identities —
      named owners, scoped permissions, expiration dates, and tested revocation
      are not optional features of AI deployment, they are baseline requirements."
    - "Patch cycle governance must evolve alongside patch volume — 167 monthly
      vulnerabilities require triage, prioritization, and accelerated deployment
      for actively exploited CVEs that a calendar-based monthly cycle cannot provide."
    - "Digital asset approval workflows must require multi-party authorization —
      any transaction approval completable by a single individual responding to
      an unsolicited request is an approval phishing vulnerability."

forward_outlook:
  predictions: |
    AI-service credential leak volume will exceed 2 million exposed secrets in
    2026 as AI agent adoption broadens into customer-facing applications — voice
    AI, sales automation, and support agents each introduce new credential surfaces
    with the same governance gaps documented in 2025. Organizations that have not
    deployed secrets management and workload identity federation by mid-2026 will
    accumulate credential debt at a rate that makes incident response increasingly
    complex with each quarter. Expect secrets scanning vendors to reposition
    credential governance as a board-level AI risk metric rather than a developer
    tooling feature.

    The patch volume trend will continue upward through 2026 as AI vulnerability
    discovery tools become standard in both offensive and defensive security
    programs. Expect monthly patch counts to regularly exceed 100 for major
    enterprise vendors, making current patch management processes — designed for
    lower volume environments — operationally unsustainable. Organizations will
    need to move toward risk-based, automated patch deployment with human review
    reserved for highest-risk changes, rather than manual review of every patch
    in a growing monthly catalog.


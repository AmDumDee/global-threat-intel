---
threat_summary:
  title: "North Korean State Actor Steals Crypto and Credentials via Fake Job
    Interviews, NVD Vulnerability Database Admits Coverage Collapse"
  report_date: "2026-04-16"
  threat_id: "TI-20260416-001"
  severity_business: "Critical"
  severity_technical: "Critical"

  executive_summary: |
    Microsoft disclosed a fully documented North Korean state cyberattack campaign
    — Sapphire Sleet — targeting finance, cryptocurrency, venture capital, and
    technology organizations through fake job interviews on professional networking
    platforms. The attack requires no software vulnerabilities. A target receives a
    staged interview invitation, downloads a file disguised as a Zoom SDK update,
    and unknowingly hands the attacker their system password, every browser-saved
    credential, cryptocurrency wallet keys, Telegram session data, SSH keys, Apple
    Notes, and persistent backdoor access — all within a single session. The attack
    specifically targets macOS, a platform most enterprise security programs treat
    as secondary.

    Simultaneously, NIST formally acknowledged that the National Vulnerability
    Database — the primary global reference for vulnerability severity and patch
    prioritization — can no longer keep pace with CVE submission volume, which grew
    263% between 2020 and 2025. NIST will now only fully enrich the highest-risk
    CVEs. All others receive minimal documentation. Organizations relying on NVD
    as the foundation of their patch prioritization programs are now operating on
    an explicitly incomplete dataset.

    These two disclosures together represent a structural risk event: the primary
    human-layer attack vector targeting high-value individuals has been industrialized
    by a nation-state, and the primary infrastructure organizations use to prioritize
    defensive response has announced it cannot keep up. Board-level decisions on
    identity security, Mac fleet protection, and vulnerability management governance
    are required now.

threat_intelligence:
  what_happened:
    incident_overview: |
      Sapphire Sleet, a North Korean state threat actor active since at least 2020,
      operates a systematic social engineering campaign targeting employees at
      cryptocurrency, venture capital, blockchain, and financial services firms.
      The actor creates convincing fake recruiter profiles on LinkedIn and similar
      platforms, conducts multi-session conversations about job opportunities,
      schedules technical interviews, and then directs targets to download what
      appears to be a Zoom SDK update file. The file is a compiled AppleScript
      that opens in macOS's own trusted Script Editor application — bypassing
      standard security warnings — and executes a cascading chain of downloads
      that the user never sees.

      Within a single session after opening the file, the attacker deploys a fake
      system password dialog visually identical to a legitimate macOS prompt,
      collects and validates the entered password, then silently exfiltrates:
      browser-saved passwords and cookies, cryptocurrency wallet extension data
      (Phantom, Coinbase, MetaMask equivalents), the macOS keychain database,
      Telegram session keys sufficient to hijack the account on another device,
      SSH private keys for server access, Apple Notes contents, and shell command
      history. The stolen password is immediately sent to the attacker via Telegram's
      bot API. Three persistent backdoors are installed that survive system reboots
      and disguise themselves as legitimate Apple and Google services.

      NIST's NVD announcement this week confirmed that the vulnerability database
      processed nearly 42,000 CVEs in 2025 — 45% more than any prior year — but
      still cannot keep pace with incoming submissions. Going forward, only CVEs
      already on CISA's Known Exploited Vulnerabilities list, those affecting
      federal government software, or those in defined critical software categories
      will receive full documentation. All others are categorized as "Not Scheduled."

      In related infrastructure threat activity, Operation PowerOFF — a 21-country
      law enforcement action — identified over 75,000 individuals using DDoS-for-hire
      platforms and took down 53 domains. A new botnet, PowMix, was also disclosed
      targeting Czech workforce organizations through phishing emails with
      randomized command-and-control traffic designed to evade detection.

    affected_organizations:
      - name: "Cryptocurrency and Digital Asset Firms"
        impact: "Wallet key theft enabling direct fund transfer; session hijacking
          of Telegram communications; complete credential compromise"
      - name: "Venture Capital and Blockchain Organizations"
        impact: "Intellectual property theft via Apple Notes and shell history;
          persistent backdoor enabling ongoing espionage; SSH key theft enabling
          server access"
      - name: "Financial Services with Mac Fleets"
        impact: "Credential and session theft from macOS endpoints typically outside
          enterprise security tool coverage; keychain database exfiltration"
      - name: "All Organizations Using NVD for Patch Prioritization"
        impact: "Vulnerability intelligence gap — patch prioritization programs
          now operating on an explicitly incomplete database with no timeline
          for full coverage restoration"

    attack_methodology: |
      The Sapphire Sleet attack requires no technical vulnerability. The attacker
      contacts a target through a professional networking platform posing as a
      recruiter, builds rapport over multiple sessions, and schedules a technical
      interview. The target is then directed to download a file called "Zoom SDK
      Update.scpt" — a format that macOS opens automatically in its own trusted
      Script Editor application. The file appears to show legitimate update
      instructions; the actual attack code is hidden thousands of lines below the
      visible screen area.

      When the user does not close the file and the script runs, it launches a
      chain of silent downloads. A fake password dialog — visually indistinguishable
      from a real macOS system prompt — collects the user's password and validates
      it against the system before sending it to the attacker via Telegram. Three
      backdoors are then installed, disguised as iCloud and Google Chrome services,
      with persistence mechanisms that survive reboots. The attacker then
      systematically collects and uploads nine categories of sensitive data over
      encrypted connections. The final step shows a convincing "update complete"
      dialog, so the user believes the Zoom update finished successfully.

  why_it_matters:
    business_risks:
      financial_exposure: |
        Direct cryptocurrency theft is the primary financial risk — Sapphire Sleet
        has stolen hundreds of millions of dollars in digital assets across prior
        campaigns, with the UN estimating North Korean crypto theft at over $3 billion
        between 2017 and 2023. For organizations holding or managing crypto assets,
        a single successful compromise can result in immediate, irreversible fund
        transfer. Browser credential theft gives attackers access to banking, trading,
        and financial platforms. SSH key theft enables server access for ransomware
        or data destruction. NVD coverage gaps mean vulnerabilities in non-prioritized
        software may go unpatched for extended periods, increasing breach probability
        across the board.

      regulatory_compliance: |
        Credential and personal data theft from macOS endpoints triggers GDPR
        72-hour breach notification and CCPA obligations where applicable. For
        financial services firms, theft of trading credentials or client data
        implicates SEC, FINRA, and banking regulator reporting requirements.
        Cryptocurrency firms face FinCEN and relevant digital asset regulatory
        disclosure obligations following theft events. SSH key compromise enabling
        server access may require forensic scoping of all systems accessible via
        those keys before breach boundaries can be established for notification purposes.

      competitive_impact: |
        Sapphire Sleet specifically targets early-stage and growth-stage crypto,
        blockchain, and fintech firms where a single employee's credentials may
        provide access to significant digital assets or proprietary trading
        infrastructure. For these organizations, a successful compromise is not
        a security incident — it is an existential financial event. For larger
        financial institutions, the reputational impact of a disclosed North Korean
        state actor breach affects client trust in ways that financial penalties
        do not capture. The NVD coverage gap creates a competitive disadvantage
        for organizations that have not built alternative vulnerability intelligence
        sources — they will patch slower than peers with better threat intel.

      operational_disruption: |
        Three persistent backdoors surviving reboots means the operational response
        to a Sapphire Sleet compromise is not credential rotation — it is full device
        re-imaging and forensic review of every system accessible via stolen SSH keys.
        Telegram session hijacking disrupts communications security for the affected
        user and every contact who communicated with them through that session.
        NVD coverage gaps require security teams to build or purchase supplemental
        vulnerability intelligence, increasing operational cost and team workload
        at a time when CVE volume is already overwhelming most programs.

    industry_patterns:
      affected_sectors:
        - "Cryptocurrency and Digital Assets"
        - "Venture Capital and Private Equity"
        - "Blockchain Technology"
        - "Financial Services"
        - "Technology (Mac-heavy organizations)"

      trend_analysis: |
        Sapphire Sleet's campaign represents the industrialization of a social
        engineering playbook that North Korean actors have refined over years.
        The shift to macOS-specific attack chains reflects deliberate targeting
        of the security gap most enterprise programs leave unaddressed. The use
        of legitimate system tools — macOS Script Editor, AppleScript, curl,
        the Telegram Bot API — means the attack leaves minimal forensic trace
        and bypasses most endpoint detection. This is not an isolated campaign;
        it is a documented, ongoing operation with confirmed infrastructure and
        consistent methodology across multiple victim organizations.

        The NVD coverage announcement is the formalization of a problem that
        has been building for two years. With AI-assisted vulnerability discovery
        accelerating CVE submission volumes further, the gap between submissions
        and enrichment will widen, not close, through 2026 and beyond.

technical_context:
  vulnerability_details:
    cve_identifier: "N/A (Sapphire Sleet — no software vulnerability exploited)"
    vulnerability_type: |
      Pure social engineering attack chain. No CVE required. Attack abuses
      legitimate macOS system tools (Script Editor, AppleScript, osascript, curl)
      and user trust in software update workflows. NVD gap: structural — not
      a single CVE but a systemic database coverage failure affecting all
      non-prioritized vulnerabilities going forward.
    affected_systems:
      - "macOS endpoints (all versions — attack uses trusted system tools)"
      - "Cryptocurrency wallet browser extensions (Phantom, Coinbase, OKX, others)"
      - "Telegram Desktop on macOS"
      - "Chromium-based browsers (Chrome, Brave, Arc) on macOS"
      - "Any system accessible via SSH keys stored on compromised macOS device"
    exploitation_status: "Active — confirmed ongoing campaign with live infrastructure
      and multiple documented victim organizations"

  attack_indicators:
    - "Unsolicited recruiter outreach on LinkedIn directing to download a
      Zoom SDK, video conferencing tool, or developer kit update"
    - "macOS Script Editor (.scpt files) opening unexpectedly or without
      user intent"
    - "System password dialogs appearing outside of expected update workflows
      or immediately after opening a downloaded file"
    - "Outbound connections to domains matching *webzoom.us or check02id.com"
    - "LaunchDaemon plist files named com.google.webkit.service.plist or
      similar Google/Apple naming conventions not belonging to genuine software"
    - "Processes named com.apple.cli, icloudz, or com.google.chromes.updaters
      in running process list"
    - "Telegram Bot API connections (api.telegram.org/bot) initiated by
      non-Telegram processes"

strategic_response:
  executive_decisions:
    - priority: "Critical"
      decision: "Mandate hardware security keys (FIDO2/passkeys) for all employees
        with access to cryptocurrency assets, trading platforms, financial systems,
        or privileged server access — treat this as a board-approved control, not
        an IT recommendation"
      business_justification: "The entire Sapphire Sleet attack chain begins with
        one stolen password entered into a convincing fake dialog. A hardware
        security key makes that credential useless to an attacker regardless of
        how it was obtained. For organizations holding or managing digital assets,
        this is the single highest-ROI control available."
      cost_estimate: "Hardware key deployment: $50-$80 per employee for keys,
        $20K-$60K for rollout program. Cost of crypto wallet compromise: potentially
        total loss of held digital assets."

    - priority: "Critical"
      decision: "Commission an independent security assessment of your macOS fleet
        and establish Mac-specific endpoint detection coverage equivalent to your
        Windows program — treat macOS as a primary enterprise attack surface,
        not a secondary one"
      business_justification: "Sapphire Sleet specifically targets macOS because
        enterprise security programs are Windows-first. Most organizations have
        significant gaps in Mac detection, response, and monitoring that attackers
        are deliberately exploiting. If your CISO cannot confirm equivalent Mac
        coverage today, you have a known gap being actively targeted."
      cost_estimate: "Mac security assessment: $20K-$50K. Mac endpoint detection
        platform: $30-$60 per device annually. Cost of undetected Mac compromise
        with three persistent backdoors: full incident response plus all downstream
        system access review."

    - priority: "High"
      decision: "Establish a vulnerability prioritization program that does not
        depend solely on NVD — evaluate commercial threat intelligence feeds,
        CISA KEV as a minimum floor, and vendor-direct advisories as supplements
        to the now-explicitly-incomplete NVD dataset"
      business_justification: "NIST confirmed this week that NVD cannot keep pace
        with CVE volume. Organizations whose patch prioritization programs rely
        on NVD severity scores are now operating on incomplete data by the database's
        own admission. This is a governance gap, not a technology gap."
      cost_estimate: "Commercial vulnerability intelligence subscription: $15K-$60K
        annually. Cost of unpatched vulnerability exploitation due to deprioritized
        CVE: $4.88M average breach cost (IBM 2024)."

    - priority: "High"
      decision: "Implement a formal policy governing employee engagement with
        unsolicited recruiter outreach on professional networking platforms,
        specifically covering any request to download, install, or execute
        software as part of an interview or assessment process"
      business_justification: "Sapphire Sleet's entry point is indistinguishable
        from legitimate recruiter activity on LinkedIn and equivalent platforms.
        Without a clear policy and user education specific to this attack pattern
        — not generic phishing awareness — employees in finance, crypto, and tech
        roles remain high-value targets with no institutional guidance."
      cost_estimate: "Policy development and targeted training program: $10K-$30K.
        Cost of one successful Sapphire Sleet compromise: credential reset across
        all accessed systems, device re-imaging, forensic review, and potential
        direct asset theft."

  governance_implications:
    board_reporting: |
      Boards at organizations in finance, crypto, or technology should request:
      (1) confirmation that hardware security keys are deployed for all privileged
      and digital-asset-adjacent roles, (2) Mac fleet security coverage status
      vs. Windows program parity, (3) current vulnerability prioritization sources
      beyond NVD and their coverage methodology, (4) employee policy status for
      handling unsolicited recruiter outreach requesting software installation.
      For organizations holding cryptocurrency assets, board-level disclosure of
      the Sapphire Sleet campaign as a named threat to those assets is warranted.

    disclosure_requirements: |
      Confirmed Sapphire Sleet compromise triggers breach notification obligations
      under GDPR (72 hours), CCPA, and applicable financial services regulations.
      Cryptocurrency theft requires disclosure to relevant digital asset regulators
      and, for public companies, SEC 8-K filing if material. SSH key compromise
      requires scoping of all accessible systems before breach boundaries can be
      established for notification. Legal counsel should be engaged immediately
      upon suspected compromise given the breadth of data categories exfiltrated.

analysis_and_insights:
  uncomfortable_truths: |
    The Sapphire Sleet campaign does not exploit a software vulnerability. It
    exploits the gap between what security awareness training teaches and what
    a sophisticated attacker actually does. Training that tells employees to avoid
    suspicious links does not address a multi-week relationship built through a
    professional networking platform, followed by a file that opens in a trusted
    Apple application and shows what looks like legitimate update code. The attack
    is designed to look exactly like what it claims to be. Most employees who
    opened this file would not know they had been compromised.

    The NVD announcement deserves more executive attention than it has received.
    The global vulnerability database is the foundation on which most enterprise
    patch prioritization programs are built. NIST has now formally stated that
    it cannot keep pace and will deprioritize coverage of a significant portion
    of submitted CVEs. Organizations that have not built vulnerability intelligence
    programs independent of NVD are now operating with a tool that its own
    operator has declared insufficient. This is not a future risk — it is a
    current gap that attackers with better intelligence than your team will exploit.

  strategic_lessons:
    - "Social engineering by nation-states is now indistinguishable from legitimate
      professional interactions — policy and hardware controls, not awareness training
      alone, are the appropriate response tier."
    - "macOS is a primary enterprise attack surface for high-value targets — security
      programs that treat it as secondary are operating with a documented gap that
      sophisticated attackers deliberately exploit."
    - "NVD deprioritization requires immediate governance response — patch programs
      built on NVD as the sole source now have an explicitly acknowledged blind spot
      that requires supplemental intelligence investment."
    - "Cryptocurrency and digital asset access requires board-level security controls
      — North Korea's state cyber program is specifically and systematically targeting
      these assets as a national revenue source."

forward_outlook:
  predictions: |
    Sapphire Sleet and related North Korean actor campaigns will expand their
    macOS targeting and refine social engineering lures to match current hiring
    trends — AI roles, crypto analyst positions, and Web3 development opportunities
    are likely next-wave lures given their current market visibility. Expect the
    fake interview playbook to appear in copycat criminal campaigns within six
    months as the documented technique proliferates beyond state actors. Organizations
    in crypto, fintech, and high-growth tech that have not addressed Mac security
    parity should treat compromise as a when, not if, question.

    The NVD coverage gap will widen through 2026 as AI-assisted vulnerability
    discovery accelerates CVE submission volume. Expect commercial vulnerability
    intelligence providers to position NVD supplementation as a primary product
    category, and expect CISA's KEV catalog to carry increasing weight as the
    de facto minimum floor for patch prioritization in the absence of full NVD
    coverage. Organizations that build multi-source vulnerability intelligence
    programs now will have a measurable defensive advantage over those waiting
    for NVD to resolve its backlog.


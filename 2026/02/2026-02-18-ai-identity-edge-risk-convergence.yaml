analysis_and_insights:
  uncomfortable_truths: |
    Many enterprises continue investing heavily in perimeter defenses while attackers bypass them entirely through trusted identities and operational workflows. Security programs optimized for compliance reporting rather than operational resilience are increasingly ineffective.

    AI adoption is also outpacing governance maturity. Organizations are integrating AI into development and operational workflows faster than they can establish meaningful oversight, creating new unmanaged attack pathways.

  strategic_lessons:
    - "One stolen credential can become an enterprise-wide business crisis"
    - "Operational technology is now part of the core cyber risk portfolio"
    - "AI automation increases both productivity and systemic exposure"
    - "Visibility into trust relationships matters more than perimeter size"

forward_outlook:
  predictions: |
    Over the next 12 months, attackers will increasingly target AI-enabled workflows, machine identities, operational technology, and SaaS trust relationships rather than relying solely on malware deployment.

    Boards should expect regulators, insurers, and investors to demand stronger governance around AI usage, identity controls, operational resilience, and third-party access visibility as attack automation continues accelerating.

